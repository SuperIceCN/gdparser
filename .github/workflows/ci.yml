name: CI

on:
  push:
    branches: ["master", "main"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-test:
    name: build-and-test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - windows-latest
          - ubuntu-latest
          - macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
          cache: gradle

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Compile classes (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: .\gradlew.bat classes --no-daemon --info --console=plain

      - name: Compile classes (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: ./gradlew classes --no-daemon --info --console=plain

      - name: Run targeted tests (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: >
          .\gradlew.bat test
          --tests dev.superice.gdparser.infra.treesitter.GdParserFacadeTest
          --tests dev.superice.gdparser.frontend.cst.CstAdapterTest
          --tests dev.superice.gdparser.frontend.cst.CstFixtureScriptsTest
          --tests dev.superice.gdparser.frontend.lowering.CstToAstMapperTest
          --tests dev.superice.gdparser.frontend.serialize.AstSexprSerdeTest
          --no-daemon --info --console=plain

      - name: Run targeted tests (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: >
          ./gradlew test
          --tests dev.superice.gdparser.infra.treesitter.GdParserFacadeTest
          --tests dev.superice.gdparser.frontend.cst.CstAdapterTest
          --tests dev.superice.gdparser.frontend.cst.CstFixtureScriptsTest
          --tests dev.superice.gdparser.frontend.lowering.CstToAstMapperTest
          --tests dev.superice.gdparser.frontend.serialize.AstSexprSerdeTest
          --no-daemon --info --console=plain
